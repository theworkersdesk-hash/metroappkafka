[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "/usr/local/bin/start-redpanda.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Healthcheck on Admin API
healthcheckPath = "/v1/status/ready"
healthcheckPort = 9644

# Enable TCP Proxy for external Kafka connections
[[deploy.tcpProxies]]
port = 9092